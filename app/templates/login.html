{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}

<h3>{{ _('Вход') }}</h3><br>

<form action="" method="POST">
    {% for field in form %}
    <div class="mb-3">
        {{ field.label(class="form-label") }}
        {{ field(class="form-control") }}
    </div>
    {% endfor %}
    <button class="btn btn-success" type="submit">{{ _('Войти') }}</button>
</form>
<br>
<p>{{ _('Еще нет аккаунта?') }} <a href="{{ url_for('registration') }}">{{ _('Регистрация') }}</a></p>
{% endblock %}
