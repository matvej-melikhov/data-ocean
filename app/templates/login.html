{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}

    <h3>Вход</h3><br>

    <form action="" method="POST">
        {% for field in form %}
            <div class="mb-3">
                {{ field.label(class="form-label") }}
                {{ field(class="form-control") }}
            </div>
        {% endfor %}
        <button class="btn btn-success" type="submit">Отправить</button>
    </form>
    <br>
    <p>Еще нет аккаунта ВКонакте? <a href="{{ url_for('registration') }}">Регистрация</a></p>
{% endblock %}
