{% extends "base.html" %}

{% block title %}{{ _('Регистрация') }}{% endblock %}

{% block content %}

<h3>{{ _('Регистрация') }}</h3><br>

<form action="" method="POST" enctype="multipart/form-data">
    {{ form.csrf_token }}
    {% for field in form %}
    <div class="mb-3">
        {{ field.label(class="form-label") }}
        {{ field(class="form-control") }}
    </div>
    {% endfor %}
    <button class="btn btn-success" type="submit">{{ _('Зарегистрироваться') }}</button>
</form>

{% endblock %}
