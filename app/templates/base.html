<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-HwwvtgBNo3bZJJLYd8oVXjrBZt8cqVSpeBNS5n7C8IVInixGAoxmnlMuBnhbgrkm" crossorigin="anonymous"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.3.1/styles/default.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.3.1/highlight.min.js"></script>
    <title>{% block title %}{% endblock %}</title>
</head>

<script>hljs.highlightAll();</script>
<style>
    table {
        border-collapse: collapse;
        margin: 15px 0px;
    }
    th, td {
        border: 1px solid #ddd;
        padding: 5px;
    }
    th {
        background-color: #f2f2f2;
    }
    tr:hover {
        background-color: #f5f5f5;
    }
    * {
        text-decoration: none !important;
    }
</style>

<body>
    <header class="py-3 mb-3 border-bottom">
        <div class="col-md-10 mx-auto container-fluid d-grid gap-3 align-items-center" style="grid-template-columns: 1fr 2fr;">
          <div class="dropdown">
            <a href="#" class="d-flex align-items-center col-lg-4 mb-2 mb-lg-0 link-body-emphasis text-decoration-none dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
                <img width="150px" src="{{ url_for('index') }}static/img/notion.svg" alt="">
            </a>
            <ul class="dropdown-menu text-small shadow" style="">
                <li><a class="dropdown-item" href="{{ url_for('index') }}">Главная</a></li>
                <li><a class="dropdown-item" href="{{ url_for('blog') }}">Статьи</a></li>
                <li><a class="dropdown-item" href="{{ url_for('create_post') }}">Написать статью +</a></li>
            </ul>
          </div>

          <div class="d-flex align-items-center">
            <form class="w-100 me-3" role="search" action="{{ url_for('search') }}" method="GET">
                <div class="d-flex">
                    <input type="search" class="form-control" placeholder="Например, статистическая значимость" name="s" value="{{ request.args.get('s', '') }}">
                    <button class="btn btn-outline-success ms-2" type="submit">Поиск</button>
                </div>
            </form>

            <div class="flex-shrink-0 dropdown">
              <a href="#" class="d-block link-body-emphasis text-decoration-none dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
                <img style="border-radius: 100px;" src="{{ url_for('user_avatar', user_id=current_user.id) }}" width="32px" alt="">
              </a>
              <ul class="dropdown-menu text-small shadow" style="">
                <li><a class="dropdown-item" href="{{ url_for('profile') }}">Профиль</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item" href="{{ url_for('logout') }}">Выйти из аккаунта</a></li>
              </ul>
            </div>
          </div>
        </div>
    </header>

    <br>
    <div class="col-md-10 mx-auto">
        {% for message in get_flashed_messages() %}
            <div class="alert alert-primary" role="alert">
                {{ message }}
            </div>
        {% endfor %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
